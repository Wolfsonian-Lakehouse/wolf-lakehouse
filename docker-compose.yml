services:
  prefect-server:
    image: prefecthq/prefect:3.7.5-python3.10
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=/api
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/root/.prefect

  lakehouse:
    build: .
    volumes:
      - .:/app
      - /etc/krb5.keytabs/aaukstuo.keytab:/app/aaukstuo.keytab:ro
      - /mnt/digital_images:/app/data/raw/digital_images:ro
      - /mnt/digital_images_staging:/app/data/raw/digital_images_staging:ro
      - /mnt/data/gold/images:/app/data/gold/images
      - /mnt/data/gold/audio:/app/data/gold/audio
    working_dir: /app
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - GA4_PROPERTY_ID=${GA4_PROPERTY_ID:-}
    depends_on:
      - prefect-server
    command: bash -c "sleep 5 && python etl-pipelines/orchestrate_prefect.py"

  metabase:
    build:
      context: .
      dockerfile: Dockerfile.metabase
    ports:
      - "3030:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
      - JAVA_OPTS=-Xmx8g
    volumes:
      - ./data:/metabase-data
      - ./data:/app/data
      - ./metabase-plugins:/plugins
  frontend:
    build: ./frontend-explorer
    ports:
      - "3000:3000"
    volumes:
      - ./data/gold:/app/public/data:ro
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

  images-server:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/data/gold/images:/usr/share/nginx/html/images:ro
      - /mnt/data/gold/audio:/usr/share/nginx/html/audio:ro

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3001:3001"
    volumes:
      - ./uptime-kuma-data:/app/data

  log-alerter:
    build: ./log-alerter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SMTP_SERVER=${SMTP_SERVER:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - DESTINATION_EMAIL=${DESTINATION_EMAIL:-}

  api-server:
    build: ./api-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro

volumes:
  prefect-data: {}