services:
  prefect-server:
    image: prefecthq/prefect:3-python3.10
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=/api
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/root/.prefect

  lakehouse:
    build: .
    volumes:
      - .:/app
      - /etc/krb5.keytabs/aaukstuo.keytab:/app/aaukstuo.keytab:ro
    working_dir: /app
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server
    command: bash -c "sleep 5 && python etl-pipelines/orchestrate_prefect.py"

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3030:3000"
    volumes:
      - ./data:/metabase-data
      - ./metabase-plugins:/plugins

volumes:
  prefect-data: {}