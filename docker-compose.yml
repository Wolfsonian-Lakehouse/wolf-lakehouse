services:
  prefect-server:
    image: prefecthq/prefect:3-python3.10
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=/api
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/root/.prefect

  lakehouse:
    build: .
    volumes:
      - .:/app
      - /etc/krb5.keytabs/aaukstuo.keytab:/app/aaukstuo.keytab:ro
      - /mnt/digital_images:/app/data/raw/digital_images:ro
      - ./data/gold/images:/app/data/gold/images
    working_dir: /app
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server
    command: bash -c "sleep 5 && python etl-pipelines/orchestrate_prefect.py"

  metabase:
    build:
      context: .
      dockerfile: Dockerfile.metabase
    ports:
      - "3030:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
      - JAVA_OPTS=-Xmx4g -Xms4g
    volumes:
      - ./data:/metabase-data
      - ./data:/app/data
      - ./metabase-plugins:/plugins
  frontend:
    build: ./frontend-explorer
    ports:
      - "3000:3000"
    volumes:
      - ./data/gold:/app/public/data:ro
      - ./data/gold/images:/app/public/images:ro
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

volumes:
  prefect-data: {}